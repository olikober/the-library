      groups: [ios]
    - name: device-integrity
      description: Verify device legitimacy and app integrity using DeviceCheck (DCDevice per-device bits) and App Attest (DCAppAttestService key generation, attestation, and assertion flows). Use when implementing fraud prevention, detecting compromised devices, validating app authenticity with Apples servers, protecting sensitive API endpoints with attested requests, or adding device verification to your backend architecture.
