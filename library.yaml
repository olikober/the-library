  agents:
    - name: documenter
      description: Documentation and README generation. Write clear, concise documentation. Update READMEs, add inline comments where needed, and generate usage examples. Match the projects existing doc style.
      source: ./agents/documenter.md
      groups: [development]
    - name: plan-reviewer
      description: Plan critic — reviews, challenges, and validates implementation plans. Identifies missing steps, edge cases, or dependencies the planner overlooked. Flags risks and evaluates feasibility.
      source: ./agents/plan-reviewer.md
      groups: [development]
    - name: planner
      description: Creates implementation plans from context and requirements. Produces clear implementation plans with numbered steps, acceptance criteria, and validation commands.
      source: ./agents/planner.md
      groups: [development]
    - name: react-dev
      description: A react developer subagent with full capabilities, isolated context. Works autonomously to complete assigned tasks using all available tools.
      source: ./agents/react-dev.md
      groups: [react, development]
    - name: red-team
      description: Security and adversarial testing. Find security vulnerabilities, edge cases, and failure modes. Check for injection risks, exposed secrets, missing validation, and unsafe defaults.
      source: ./agents/red-team.md
      groups: [security, development]
    - name: scout
      description: Fast codebase recon that returns compressed context for handoff. Quickly investigates a codebase and returns structured findings with file locations and dependencies.
      source: ./agents/scout.md
      groups: [development]
    - name: ui-designer
      description: Use when a task needs concrete UI decisions, interaction design, and implementation-ready design guidance. Produces design recommendation by screen/component, interaction-state notes, and implementation guidance.
      source: ./agents/ui-designer.md
      groups: [design, development]
  prompts:
    - name: commit
      description: Create a new commit for all of our uncommitted changes. Run git status and diff to see what files are uncommitted, add the untracked and changed files, then add an atomic commit message with an appropriate tag such as feat, fix, docs, etc.
      source: ./prompts/commit.md
      groups: [git]
    - name: create-prd
      description: Generate a comprehensive Product Requirements Document (PRD) based on the current conversation context and requirements discussed.
      source: ./prompts/create-prd.md
      groups: [product]
    - name: execute
      description: Execute an implementation plan. Read the plan, analyze task dependencies, then implement tasks in the correct order.
      source: ./prompts/execute.md
      groups: [development]
    - name: plan-feature
      description: Transform a feature request into a comprehensive implementation plan through systematic codebase analysis, external research, and strategic planning.
      source: ./prompts/plan-feature.md
      groups: [development]
    - name: prime
      description: Get expertise context. Check if mulch and seeds are initialized and primed. If not, ask user if they should be initialized.
      source: ./prompts/prime.md
      groups: [base]
